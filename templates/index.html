<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Churn Prediction</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; }
    form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }
    select, input { width: 100%; padding: 6px; }
    button { grid-column: 1 / -1; padding: 10px; font-size: 15px; margin-top: 10px; cursor: pointer; }
    .result { margin-top: 25px; padding: 15px; border-radius: 6px; background: #f1f1f1; }
  </style>
</head>
<body>
  <h1>Customer Churn Prediction</h1>

  <form action="/predict" method="post">
    <div>
      <label>Gender</label>
      <select name="gender">
        <option>Female</option>
        <option>Male</option>
      </select>
    </div>

    <div>
      <label>Senior Citizen</label>
      <select name="SeniorCitizen">
        <option value="0">No</option>
        <option value="1">Yes</option>
      </select>
    </div>

    <div>
      <label>Partner</label>
      <select name="Partner"><option>No</option><option>Yes</option></select>
    </div>

    <div>
      <label>Dependents</label>
      <select name="Dependents"><option>No</option><option>Yes</option></select>
    </div>

    <div>
      <label>Tenure (months)</label>
      <input type="number" step="1" name="tenure" required>
    </div>

    <div>
      <label>Phone Service</label>
      <select name="PhoneService"><option>No</option><option>Yes</option></select>
    </div>

    <div>
      <label>Multiple Lines</label>
      <select name="MultipleLines">
        <option>No</option><option>Yes</option><option>No phone service</option>
      </select>
    </div>

    <div>
      <label>Internet Service</label>
      <select name="InternetService">
        <option>DSL</option><option>Fiber optic</option><option>No</option>
      </select>
    </div>

    <div>
      <label>Online Security</label>
      <select name="OnlineSecurity">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Online Backup</label>
      <select name="OnlineBackup">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Device Protection</label>
      <select name="DeviceProtection">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Tech Support</label>
      <select name="TechSupport">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Streaming TV</label>
      <select name="StreamingTV">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Streaming Movies</label>
      <select name="StreamingMovies">
        <option>No</option><option>Yes</option><option>No internet service</option>
      </select>
    </div>

    <div>
      <label>Contract</label>
      <select name="Contract">
        <option>Month-to-month</option><option>One year</option><option>Two year</option>
      </select>
    </div>

    <div>
      <label>Paperless Billing</label>
      <select name="PaperlessBilling"><option>No</option><option>Yes</option></select>
    </div>

    <div>
      <label>Payment Method</label>
      <select name="PaymentMethod">
        <option>Electronic check</option>
        <option>Mailed check</option>
        <option>Bank transfer (automatic)</option>
        <option>Credit card (automatic)</option>
      </select>
    </div>

    <div>
      <label>Monthly Charges</label>
      <input type="number" step="0.01" name="MonthlyCharges" required>
    </div>

    <div>
      <label>Total Charges</label>
      <input type="number" step="0.01" name="TotalCharges" required>
    </div>

    <button type="submit">Predict</button>
  </form>

  {% if prediction_text %}
  <div class="result">
    <strong>{{ prediction_text }}</strong><br>
    {{ probability_text }}
  </div>
  {% endif %}
</body>
</html>
